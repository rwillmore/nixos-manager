<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square, NixOS blue gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7fc1"/>
      <stop offset="100%" stop-color="#2c4f8c"/>
    </linearGradient>
    <linearGradient id="flake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cde0ff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- NixOS-style 6-armed snowflake (3 bars crossing at 0°, 60°, 120°) -->
  <g transform="translate(256,256)" fill="url(#flake)">
    <!-- Bar 1: horizontal -->
    <rect x="-155" y="-26" width="310" height="52" rx="26"/>
    <!-- Bar 2: 60° -->
    <rect x="-155" y="-26" width="310" height="52" rx="26" transform="rotate(60)"/>
    <!-- Bar 3: 120° -->
    <rect x="-155" y="-26" width="310" height="52" rx="26" transform="rotate(120)"/>
  </g>

  <!-- Center hub (punched out in bg color, then white dot) -->
  <circle cx="256" cy="256" r="38" fill="#3a63a8"/>
  <circle cx="256" cy="256" r="22" fill="url(#flake)"/>

  <!-- Tip diamonds at each arm end (6 tips) -->
  <g transform="translate(256,256)" fill="url(#flake)">
    <!-- Right tip -->
    <ellipse cx="155" cy="0" rx="18" ry="18"/>
    <!-- Left tip -->
    <ellipse cx="-155" cy="0" rx="18" ry="18"/>
    <!-- Upper-right tip (60°) -->
    <ellipse cx="77.5" cy="-134" rx="18" ry="18"/>
    <!-- Lower-left tip (60° + 180°) -->
    <ellipse cx="-77.5" cy="134" rx="18" ry="18"/>
    <!-- Upper-left tip (120°) -->
    <ellipse cx="-77.5" cy="-134" rx="18" ry="18"/>
    <!-- Lower-right tip (120° + 180°) -->
    <ellipse cx="77.5" cy="134" rx="18" ry="18"/>
  </g>
</svg>
